<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WalGrader</title>
    <link rel="icon" type="image/png" href="walgraderfavicon.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        /* Walton Engineering Variables (Light) */
        :root {
            --primary: #002f6c;       /* Walton Navy */
            --primary-hover: #001a40;
            --secondary: #2c529c;     /* Mid Blue */
            --accent: #64748b;
            --light: #eef2f7;
            --border: #bdc3c7;
            --success: #059669;
            --danger: #c8102e;        /* Walton Cardinal Red */
            --warning: #d97706;
            --bg: #f9f9fb;
            --text-dark: #333;
            --text-light: #7f8c8d;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
            --radius: 8px;
            --card-bg: #ffffff;
            --header-bg: rgba(255, 255, 255, 0.25);
            --input-bg: #ffffff;
            --walton-red: #c8102e;
        }

        /* Walton Engineering Variables (Dark) */
        [data-theme="dark"] {
            --primary: #60a5fa;
            --primary-hover: #93c5fd;
            --secondary: #38bdf8;
            --light: #1e1e1e;
            --border: #333333;
            --success: #10b981;
            --danger: #ff6b6b;
            --warning: #f59e0b;
            --bg: #121212;
            --text-dark: #e0e0e0;
            --text-light: #aaa;
            --shadow: 0 4px 10px rgba(0,0,0,0.5);
            --card-bg: #1a1a1a;
            --header-bg: rgba(26, 26, 26, 0.65); 
            --input-bg: #2a2a2a;
            --walton-red: #ff6b6b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: var(--bg);
            color: var(--text-dark);
            transition: background-color 0.3s, color 0.3s;
            min-height: 100vh;
        }

        .container { 
            max-width: 1400px; 
            margin: 0 auto; 
            position: relative; 
            background: var(--card-bg);
            padding: 0 30px 30px 30px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            transition: background-color 0.3s, box-shadow 0.3s;
        }

        .watermark-layer {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            overflow: hidden;
            pointer-events: none;
            border-radius: var(--radius);
            z-index: 0;
        }

        .watermark-layer::before {
            content: "";
            position: absolute;
            top: 0px; 
            right: 0px;
            width: 450px;
            height: 450px;
            background-image: url('WalEngNoBG.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: top right;
            opacity: 0.10;
            pointer-events: none;
        }

        [data-theme="dark"] .watermark-layer::before {
            opacity: 0.15;
            filter: grayscale(100%) brightness(1.5);
        }
        
        .sticky-top {
            position: sticky; top: 0; background: var(--header-bg); 
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 1000; padding-top: 30px; padding-bottom: 15px; border-bottom: 2px solid var(--primary);
            margin-bottom: 30px;
            transition: background-color 0.3s;
        }

        #projectTitleContainer, .header, .ai-instruction-box, .controls, .rubric-table, #overallCommentsContainer { 
            position: relative; 
            z-index: 1; 
        }

        #projectTitleContainer { text-align: left; }
        #projectTitleContainer h1 { margin: 0; font-size: 2.2em; font-weight: 700; color: var(--primary); letter-spacing: -0.02em; }
        [data-theme="dark"] #projectTitleContainer h1 { color: var(--primary); }

        /* --- UI COLLAPSE STYLES --- */
        .title-row {
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid var(--border);
        }
        .gear-icon {
            display: inline-block;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-settings {
            background-color: transparent; color: var(--primary); border: 1px solid var(--primary);
            padding: 8px 16px; border-radius: 4px; font-weight: bold; cursor: pointer;
            transition: all 0.2s; font-family: inherit; font-size: 0.95em;
        }
        .btn-settings:hover { background-color: var(--primary); color: white; }
        [data-theme="dark"] .btn-settings { color: #93c5fd; border-color: #93c5fd; }
        [data-theme="dark"] .btn-settings:hover { background-color: rgba(96, 165, 250, 0.15); }

        .settings-wrapper {
            display: grid; grid-template-rows: 1fr;
            transition: grid-template-rows 0.4s ease-out, opacity 0.3s ease-out, margin 0.4s ease-out;
            opacity: 1; margin-bottom: 15px;
        }
        .settings-wrapper.collapsed {
            grid-template-rows: 0fr; opacity: 0; margin-bottom: 0; pointer-events: none;
        }
        .settings-inner { overflow: hidden; }

        .header {
            display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.4); 
            padding: 15px 20px; border-radius: var(--radius);
            box-shadow: var(--shadow); border: 1px solid var(--border);
            transition: background 0.3s, border-color 0.3s;
        }
        
        .header-left { display: flex; flex-direction: column; gap: 10px; width: 60%; }
        .header-right { display: flex; flex-direction: column; align-items: flex-end; justify-content: space-between; gap: 15px; min-width: 250px; }
        
        .student-info { display: flex; align-items: center; gap: 12px; font-size: 1.05em; font-weight: bold; }
        .student-info input {
            padding: 8px 12px; font-size: 0.95em; width: 300px;
            border: 1px solid var(--border); border-radius: 4px;
            font-family: inherit; transition: all 0.2s;
            background: var(--input-bg); color: var(--text-dark);
        }
        .student-info input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0, 47, 108, 0.1); }
        [data-theme="dark"] .student-info input:focus { box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.2); }

        .ai-instruction-box { display: flex; flex-direction: column; gap: 4px; }
        .ai-instruction-box label { font-size: 0.85em; font-weight: bold; color: var(--text-light); }
        .ai-instruction-box textarea {
            padding: 8px; font-size: 0.9em; width: 100%; height: 45px; resize: vertical;
            border: 1px solid var(--border); border-radius: 4px;
            font-family: inherit; transition: all 0.2s; background: var(--input-bg); color: var(--text-dark);
        }
        #learnedRulesInput { height: 80px; font-family: monospace; background: rgba(0, 47, 108, 0.03); border-color: var(--secondary); }
        [data-theme="dark"] #learnedRulesInput { background: rgba(96, 165, 250, 0.05); }

        .score-display { font-size: 1.4em; font-weight: 600; color: var(--text-light); text-align: right; }
        #totalScore { color: var(--primary); font-weight: 700; font-size: 1.2em; }

        .controls {
            display: flex; flex-wrap: wrap; gap: 10px; 
            background: rgba(255, 255, 255, 0.4); 
            padding: 12px 20px;
            border-radius: var(--radius); align-items: center; border: 1px solid var(--border); box-shadow: var(--shadow);
            transition: background 0.3s, border-color 0.3s;
        }
        
        button, label.btn {
            padding: 8px 14px; background-color: var(--secondary); color: white;
            border: 1px solid transparent; border-radius: 4px; cursor: pointer; font-size: 0.9em;
            font-family: inherit; font-weight: bold; display: inline-flex; align-items: center; gap: 6px;
            transition: all 0.2s; margin: 0;
        }
        button:hover, label.btn:hover { background-color: var(--primary); transform: translateY(-1px); }
        button:disabled { opacity: 0.5; cursor: not-allowed; pointer-events: none; }
        [data-theme="dark"] button:not(.btn-success):not(.btn-danger):not(.btn-warning):not(.btn-purple):not(.btn-darkred):not(.btn-settings) { 
            background-color: var(--input-bg); border: 1px solid var(--border); color: var(--text-dark); 
        }
        [data-theme="dark"] button:hover:not(.btn-success):not(.btn-danger):not(.btn-warning):not(.btn-purple):not(.btn-darkred):not(.btn-settings) { 
            background-color: var(--border); 
        }
        
        .btn-success { background-color: var(--primary); color: white;}
        [data-theme="dark"] .btn-success { background-color: rgba(96, 165, 250, 0.15); color: #93c5fd; border-color: rgba(96, 165, 250, 0.3); }
        .btn-danger { background-color: var(--walton-red); color: white;}
        [data-theme="dark"] .btn-danger { background-color: rgba(239, 68, 68, 0.15); color: #f87171; border-color: rgba(239, 68, 68, 0.3); }
        .btn-warning { background-color: var(--walton-red); color: white; }
        [data-theme="dark"] .btn-warning { background-color: rgba(248, 113, 113, 0.15); color: #fca5a5; border-color: rgba(248, 113, 113, 0.3); }
        .btn-info { background-color: var(--secondary); color: white;}
        .btn-purple { background-color: #8e44ad; color: white; }
        [data-theme="dark"] .btn-purple { background-color: rgba(168, 85, 247, 0.15); color: #d8b4fe; border: 1px solid rgba(168, 85, 247, 0.3); }
        .btn-darkred { background-color: #900c3f; color: white; }
        [data-theme="dark"] .btn-darkred { background-color: rgba(225, 29, 72, 0.15); color: #fda4af; border: 1px solid rgba(225, 29, 72, 0.3); }
        
        .theme-toggle { margin-left: auto; background-color: #34495e; padding: 8px 10px; }
        [data-theme="dark"] .theme-toggle { background-color: var(--card-bg); }
        
        .btn-small { padding: 4px 8px; font-size: 12px; margin-top: 5px; }
        .btn-icon { padding: 4px 8px; font-size: 14px;}
        
        input[type="file"] { display: none; }
        .edit-only { display: none; }
        .grade-only { display: inline-block; }
        
        .save-status { font-size: 0.85em; font-weight: bold; color: var(--text-light); margin-left: 10px; padding: 4px 10px; border-radius: 4px; background: var(--input-bg); border: 1px solid var(--border); }
        .save-status.active { color: var(--primary); border-color: var(--primary); background: rgba(0, 47, 108, 0.05); }
        [data-theme="dark"] .save-status.active { color: #60a5fa; border-color: #60a5fa; background: rgba(96, 165, 250, 0.1); }

        .rubric-table { width: 100%; border-collapse: separate; border-spacing: 0 8px; margin-bottom: 30px; table-layout: fixed; }
        .rubric-table th, .rubric-table td { padding: 12px 16px; vertical-align: top; word-wrap: break-word; }
        
        .criterion-title {
            font-weight: bold; font-size: 0.95em; width: 15%;
            background-color: var(--light); color: var(--text-dark);
            border-radius: 4px 0 0 4px; border: 1px solid var(--border); border-right: none;
            transition: background-color 0.3s;
        }
        [data-theme="dark"] .criterion-title { background-color: var(--input-bg); color: var(--primary); font-weight: 700; letter-spacing: 0.02em; }
        
        .level-cell {
            cursor: pointer; transition: all 0.2s; background-color: var(--card-bg);
            border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); border-right: 1px solid var(--border);
            position: relative;
        }
        .level-cell:hover:not(.edit-mode) { background-color: var(--light); z-index: 10; }

        .level-cell.selected:not(.edit-mode) {
            background-color: rgba(0, 47, 108, 0.03); border: 1px solid var(--primary);
            border-left: 1px solid var(--primary); 
            z-index: 20; box-shadow: inset 0 0 0 1px var(--primary);
        }
        [data-theme="dark"] .level-cell.selected:not(.edit-mode) { 
            background-color: rgba(96, 165, 250, 0.08); border-color: var(--primary); box-shadow: inset 0 0 0 1px var(--primary);
        }

        .level-title { font-weight: bold; margin-bottom: 4px; display: block; font-size: 0.95em; color: var(--primary); }
        .level-pts { color: var(--walton-red); font-weight: bold; background: var(--input-bg); border: 1px solid var(--border); padding: 2px 6px; border-radius: 4px; font-size: 0.75em; display: inline-block; margin-bottom: 8px; }
        [data-theme="dark"] .level-pts { background: var(--card-bg); }
        .level-desc { font-size: 0.85em; margin-top: 4px; color: var(--text-light); line-height: 1.5; }
        
        .score-cell {
            width: 90px; text-align: center; vertical-align: middle !important;
            background-color: var(--light); border-radius: 0 4px 4px 0; border: 1px solid var(--border); border-left: none;
            transition: background-color 0.3s;
        }
        [data-theme="dark"] .score-cell { background-color: var(--input-bg); }
        
        .score-cell div { font-weight: bold; color: var(--primary); margin-bottom: 6px; font-size: 0.75em; text-transform: uppercase; letter-spacing: 0.05em; }
        .score-input {
            width: 60px; padding: 6px; font-size: 1.1em; text-align: center;
            border: 1px solid var(--border); border-radius: 4px; font-weight: bold;
            font-family: inherit; color: var(--primary); transition: all 0.2s;
            background: var(--input-bg);
        }
        .score-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0, 47, 108, 0.1); }
        [data-theme="dark"] .score-input:focus { box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.2); }
        
        .comments-row td { background-color: transparent; border: none; padding: 0 0 16px 0; }
        .comments-input {
            width: 100%; padding: 12px 16px; border: 1px dashed var(--border); border-radius: 4px; resize: vertical; min-height: 40px;
            font-family: inherit; font-size: 0.9em; box-sizing: border-box; background: var(--card-bg); color: var(--text-dark); transition: all 0.2s;
        }
        .comments-input:focus { outline: none; border-color: var(--primary); border-style: solid; box-shadow: 0 0 0 3px rgba(0, 47, 108, 0.1); }
        [data-theme="dark"] .comments-input:focus { box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.2); }

        #overallCommentsContainer { margin-top: 10px; padding-top: 10px; }
        #overallCommentsContainer h3 { color: var(--primary); margin-top: 0; margin-bottom: 10px; font-size: 1.1em; }

        .edit-input, .edit-textarea {
            width: 100%; padding: 6px 10px; margin-bottom: 6px; border: 1px solid var(--border); border-radius: 4px; box-sizing: border-box;
            font-family: inherit; font-size: 0.9em; transition: all 0.2s; background: var(--input-bg); color: var(--text-dark);
        }
        .edit-input:focus, .edit-textarea:focus { outline: none; border-color: var(--primary); background: var(--card-bg); }
        .edit-textarea { resize: vertical; min-height: 60px; }
        .edit-flex { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; }
        .edit-pts { width: 60px; font-weight: bold; color: var(--walton-red); }
        .move-controls { display: flex; gap: 4px; margin-top: 8px; }

        [data-theme="dark"] .header { background: rgba(30, 30, 30, 0.85); border-color: #555; }
        [data-theme="dark"] .controls { background: rgba(30, 30, 30, 0.85); border-color: #555; }

        #loadingOverlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(5px); z-index: 9999;
            flex-direction: column; justify-content: center; align-items: center;
            color: var(--primary); font-family: inherit; text-align: center;
        }
        [data-theme="dark"] #loadingOverlay { background: rgba(18, 18, 18, 0.85); color: #60a5fa; }

        #smartFillBtn {
            position: fixed; bottom: -100px; right: 40px; background-color: var(--success);
            color: white; border: none; border-radius: 50px; padding: 12px 20px;
            font-size: 1.05em; font-weight: bold; box-shadow: var(--shadow); cursor: pointer;
            z-index: 2000; opacity: 0; transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease, transform 0.2s, background-color 0.2s;
            display: flex; align-items: center; gap: 8px; font-family: inherit;
        }
        #smartFillBtn.visible { bottom: 40px; opacity: 1; }
        #smartFillBtn:hover { transform: translateY(-3px) scale(1.02); background-color: var(--primary); }
        [data-theme="dark"] #smartFillBtn { background-color: rgba(16, 185, 129, 0.15); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); }
        [data-theme="dark"] #smartFillBtn:hover { background-color: rgba(16, 185, 129, 0.3); }

        /* --- TEACH AI MODAL CSS --- */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6); z-index: 10000; justify-content: center; align-items: center; backdrop-filter: blur(3px);
        }
        .modal-content {
            background: var(--card-bg); padding: 30px; border-radius: var(--radius);
            width: 600px; max-width: 90%; box-shadow: var(--shadow); border: 1px solid var(--border); text-align: left;
        }
        .modal-content h3 { margin-top: 0; color: var(--primary); }
        .drop-zone {
            border: 2px dashed var(--primary); padding: 15px; text-align: center; border-radius: var(--radius); cursor: pointer;
            transition: all 0.2s; background: var(--input-bg); color: var(--text-dark); font-weight: bold; display: flex; align-items: center; justify-content: center;
            min-height: 60px; word-break: break-word; font-size: 0.9em;
        }
        .drop-zone.dragover { background: rgba(0, 47, 108, 0.1); transform: scale(1.02); }
        [data-theme="dark"] .drop-zone.dragover { background: rgba(96, 165, 250, 0.15); }
        .drop-zone.has-file { border-style: solid; background: rgba(5, 150, 105, 0.1); border-color: var(--success); color: var(--success); }
        
        .queue-container {
            margin-bottom: 20px; max-height: 150px; overflow-y: auto; border: 1px solid var(--border); 
            border-radius: 4px; padding: 10px; background: var(--bg); display: none;
        }
        .queue-item { font-size: 0.85em; padding: 6px; border-bottom: 1px solid var(--border); color: var(--text-dark); }
        .queue-item:last-child { border-bottom: none; }
        
        /* ---------------------------------------------------
           MOBILE OPTIMIZATION
           --------------------------------------------------- */
        @media (max-width: 768px) {
            body { padding: 10px; }
            .container { padding: 0 15px 20px 15px; }
            .sticky-top { position: relative; padding-top: 15px; }
            .header { flex-direction: column; align-items: stretch; text-align: center; gap: 10px; padding: 12px; }
            .header-left { width: 100%; }
            .header-right { width: 100%; align-items: stretch !important; margin-top: 5px;}
            .student-info { flex-direction: column; align-items: stretch; }
            .student-info input { width: 100%; box-sizing: border-box; }
            .score-display { margin-top: 5px; text-align: center; }
            
            .controls { flex-direction: column; align-items: stretch; text-align: center; gap: 10px; padding: 12px; justify-content: center; }
            .btn-separator { display: none; } 
            .controls button, .controls label.btn, .save-status { 
                width: 100%; margin-left: 0 !important; padding: 12px; font-size: 1em;
                box-sizing: border-box; display: flex; justify-content: center; align-items: center;
            }
            .rubric-table th, .rubric-table td { padding: 10px 4px; }
            .criterion-title { width: 30%; font-size: 0.85em; }
            .score-cell { width: 70px; }
            .level-cell:not(.edit-mode) .level-title, .level-cell:not(.edit-mode) .level-desc { display: none; }
            .level-cell:not(.edit-mode) { text-align: center; vertical-align: middle; }
            .level-cell:not(.edit-mode) .level-pts { font-size: 1.3em; margin: 0; padding: 15px 4px; display: block; border: none; background: transparent; }
            .score-input { width: 100%; font-size: 1.4em; padding: 12px 4px; box-sizing: border-box; }
            #smartFillBtn { right: 20px; font-size: 0.9em; padding: 10px 15px; }
            .modal-content { width: 95%; padding: 20px; }
            .drop-zone-container { flex-direction: column; }
        }
                      
    </style>
</head>
<body>

<div id="loadingOverlay">
    <img src="WalEngSpin.gif" alt="Loading..." style="width: 240px; margin-bottom: 20px;">
    <h2 id="loadingText" style="margin:0; white-space: pre-line;">AI is processing...</h2>
    <p id="loadingSubtext" style="margin-top:5px; color:var(--text-light); font-size:1.1em; font-weight:bold;">This usually takes 5-15 seconds.</p>
</div>

<div id="teachModal" class="modal-overlay">
    <div class="modal-content">
        <h3>🧠 Teach AI: The Training Cart</h3>
        <p style="font-size: 0.9em; color: var(--text-light); margin-bottom: 20px;">Provide a student's document and their graded JSON. The app will pair them automatically. Build up a batch, then click Start Learning!</p>
        
        <div class="drop-zone-container" style="display: flex; gap: 10px; margin-bottom: 15px;">
            <div id="dropZoneDoc" class="drop-zone" style="flex: 1;">📄 1. Drop Document</div>
            <input type="file" id="teachDocInput" accept=".pdf, .png, .jpg, .jpeg">

            <div id="dropZoneJson" class="drop-zone" style="flex: 1;">📊 2. Drop JSON</div>
            <input type="file" id="teachJsonInput" accept=".json">
        </div>

        <div id="teachQueueContainer" class="queue-container"></div>

        <div style="display: flex; justify-content: space-between; gap: 10px;">
            <button class="btn-danger" style="width:100%" onclick="closeTeachModal()">Cancel</button>
            <button id="startTeachBtn" class="btn-success" style="width:100%" disabled onclick="executeTeachAI()">Start Learning (0 Pairs)</button>
        </div>
    </div>
</div>

<div class="container">
    <div class="watermark-layer"></div>

    <div class="sticky-top">
        
        <div class="title-row">
            <div id="projectTitleContainer"></div>
            <button class="btn-settings" onclick="toggleSettings()" title="Toggle Setup & Settings">
                <span id="gearIcon" class="gear-icon">⚙️</span> <span class="hide-mobile">Settings</span>
            </button>
        </div>

        <div id="settingsWrapper" class="settings-wrapper open">
            <div class="settings-inner">
                <div class="controls">
                    <button id="toggleEditBtn" class="btn-warning" onclick="toggleEditMode()" title="Enter Edit Mode">✏️ Edit</button>
                    <span class="btn-separator" style="border-left: 2px solid var(--border); height: 30px; margin: 0 10px;"></span>
                    
                    <label class="btn btn-purple grade-only" for="autoGradeFile" title="Have AI Grade Student PDFs (Review One-by-One)">🤖 AI Grade</label>
                    <input type="file" id="autoGradeFile" accept=".pdf, .png, .jpg, .jpeg" multiple>

                    <label class="btn btn-darkred grade-only" for="batchGradeFile" title="Silent Batch Auto-Grade directly to Folder">🚀 Batch</label>
                    <input type="file" id="batchGradeFile" accept=".pdf, .png, .jpg, .jpeg" multiple>

                    <label class="btn btn-info grade-only" for="loadStudentFile" title="Load Student Data">📂 Load</label>
                    <input type="file" id="loadStudentFile" accept=".json">
                    
                    <button class="btn grade-only" onclick="selectSaveDirectory()" title="Set Save Folder">📁 Save</button>
                    <span id="saveStatus" class="save-status grade-only">No folder</span>

    // --- UI TOGGLE LOGIC ---
    function toggleSettings() {
        const wrapper = document.getElementById('settingsWrapper');

        // Spin the gear half a rotation smoothly every click

    // --- TEACH AI MODAL LOGIC (THE TRAINING CART) ---

    function openTeachModal() {
        document.getElementById('teachModal').style.display = 'flex';

        resetTeachDropZones();
        renderTeachQueue();
    }

    function closeTeachModal() {
        document.getElementById('teachModal').style.display = 'none';
    }

    function resetTeachDropZones() {
        teachDocFile = null; teachJsonFile = null;
        const dzDoc = document.getElementById('dropZoneDoc');
        const dzJson = document.getElementById('dropZoneJson');
        dzDoc.innerText = '📄 1. Drop Document';
        dzDoc.classList.remove('has-file');
        dzJson.innerText = '📊 2. Drop JSON';
        dzJson.classList.remove('has-file');
    }

    function setupDropZone(zoneId, inputId, expectedType) {
        const zone = document.getElementById(zoneId);
        const input = document.getElementById(inputId);

        zone.addEventListener('click', () => input.click());

        zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('dragover'); });
        zone.addEventListener('dragleave', () => { zone.classList.remove('dragover'); });
        zone.addEventListener('drop', (e) => {
            e.preventDefault(); zone.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) handleTeachFile(e.dataTransfer.files[0], zone, expectedType);
        });
        input.addEventListener('change', (e) => {
            if (e.target.files.length > 0) handleTeachFile(e.target.files[0], zone, expectedType);
            input.value = ""; 
        });
    }

    function handleTeachFile(file, zone, type) {
        if (type === 'doc') {
            if (!file.name.match(/\.(pdf|png|jpg|jpeg)$/i)) { alert("Please upload a PDF or Image."); return; }
            teachDocFile = file;
            zone.innerText = "✅ " + file.name.substring(0, 20) + "...";
        } else {
            if (!file.name.endsWith('.json')) { alert("Please upload a JSON file."); return; }
            teachJsonFile = file;
            zone.innerText = "✅ " + file.name.substring(0, 20) + "...";
        }
        zone.classList.add('has-file');
        
        // Auto-pair if both exist
        if (teachDocFile && teachJsonFile) {
            teachQueue.push({ doc: teachDocFile, json: teachJsonFile });
            resetTeachDropZones();
            renderTeachQueue();
        }
    }

    function renderTeachQueue() {
        const container = document.getElementById('teachQueueContainer');
        const btn = document.getElementById('startTeachBtn');
        
        if (teachQueue.length > 0) {
            container.style.display = 'block';
            container.innerHTML = teachQueue.map((pair, i) => 
                `<div class="queue-item">
                    <strong>Pair ${i+1}:</strong> ${pair.doc.name} ➕ ${pair.json.name}
                 </div>`
            ).join('');
            btn.disabled = false;
            btn.innerText = `Start Learning (${teachQueue.length} Pairs)`;
        } else {
            container.style.display = 'none';
            btn.disabled = true;
            btn.innerText = `Start Learning (0 Pairs)`;
        }
    }

    async function executeTeachAI() {
        closeTeachModal();
        document.getElementById('loadingOverlay').style.display = 'flex';
        
        let msgIdx = 0;
        document.getElementById('loadingSubtext').innerText = funnyMessages[msgIdx];
        funnyInterval = setInterval(() => {
            msgIdx = (msgIdx + 1) % funnyMessages.length;
            document.getElementById('loadingSubtext').innerText = funnyMessages[msgIdx];
        }, 3500);

        let newRulesCount = 0;

        for (let i = 0; i < teachQueue.length; i++) {
            let pair = teachQueue[i];
            document.getElementById('loadingText').innerText = `AI is studying Pair ${i+1} of ${teachQueue.length}...\nExtracting rules from ${pair.json.name}`;
            
            try {
                const jsonText = await new Promise(resolve => {
                    const r = new FileReader(); r.onload = e => resolve(e.target.result); r.readAsText(pair.json);
                });
                const gradedData = JSON.parse(jsonText);

                const docDataUrl = await new Promise(resolve => {
                    const r = new FileReader(); r.onload = e => resolve(e.target.result); r.readAsDataURL(pair.doc);
                });
                const base64Data = docDataUrl.split(',')[1];

                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: "teach",
                        fileBase64: base64Data,
                        mimeType: pair.doc.type,
                        rubric: currentRubric,
                        gradedData: { scores: gradedData.scores, comments: gradedData.comments }
                    })
                });

                const rawResponse = await response.text();
                let cleanJson = rawResponse.replace(/```json/g, '').replace(/```/g, '').trim();
                const result = JSON.parse(cleanJson);

                if (result.error) throw new Error(result.error);

                if (result.learnedRules && result.learnedRules.length > 0) {
                    if (!currentRubric.learnedRules) currentRubric.learnedRules = [];
                    currentRubric.learnedRules.push(...result.learnedRules);
                    newRulesCount += result.learnedRules.length;
                }
            } catch (err) {
                console.error(err);
                alert(`Teach AI Failed on pair ${i+1} (${pair.json.name})!\n\n` + err.message);
            }
        }

        clearInterval(funnyInterval);
        document.getElementById('loadingOverlay').style.display = 'none';
        document.getElementById('loadingSubtext').innerText = "This usually takes 5-15 seconds.";
        
        renderRubric(); // Updates the visual text box
        
        if (newRulesCount > 0) {
            alert(`Success! The AI extracted ${newRulesCount} new rules from the batch.\n\nTotal rules stored: ${currentRubric.learnedRules.length}\n\nDon't forget to click '💾 Template' to save this knowledge!`);
        } else {
            alert("Batch complete, but the AI couldn't extract any new definitive rules from these examples.");
        }
    }

    function init() {

        document.querySelectorAll('.grade-only').forEach(el => el.style.display = 'inline-block');

        document.getElementById('uploadRubric').addEventListener('change', function(e) {
            const file = e.target.files[0];

                    currentRubric = JSON.parse(e.target.result);

                    updateMaxScore();

            e.target.value = ""; 
        });

            const file = e.target.files[0];

            const reader = new FileReader();

                    const data = JSON.parse(e.target.result);

                        currentRubric = data.rubric;
                        scores = data.scores || {};
                        comments = data.comments || {};
                        isGraded = data.isGraded || {};
                        document.getElementById('studentName').value = data.studentName || "";
                        
                        overallComment = data.overallComment || "";

                            ocInput.value = overallComment;
                            ocInput.style.height = 'auto';

                        updateMaxScore();
                        renderRubric();
                    } else { alert('Invalid student data file.'); }
                } catch (err) { alert('Error parsing Student JSON file.'); }
            };
            reader.readAsText(file);
            e.target.value = ""; 
        });

        // --- ACTION 1: AUTO-BUILD LISTENER ---
        document.getElementById('autoBuildFile').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('loadingText').innerText = "AI is writing your rubric...";
            document.getElementById('loadingOverlay').style.display = 'flex';

            const reader = new FileReader();
            reader.onload = async function(event) {
                const dataUrl = event.target.result;
                try {
                    const response = await fetch(WEB_APP_URL, {
                        method: 'POST',
                        body: JSON.stringify({
                            action: "build",
                            fileBase64: dataUrl.split(',')[1],
                            mimeType: file.type
                        })
                    });
                    const rawResponse = await response.text();
                    let cleanJson = rawResponse.replace(/```json/g, '').replace(/```/g, '').trim();
                    const newRubric = JSON.parse(cleanJson);

                    if (newRubric && newRubric.error) throw new Error("Google Script says: " + newRubric.error);
                    if (newRubric && newRubric.criteria) {
                        currentRubric = newRubric;
                        clearGrades();
                        updateMaxScore();
                        renderRubric();
                        alert("Rubric successfully generated!");
                    } else throw new Error("AI missed the format.");
                } catch (err) {
                    console.error(err); alert("Auto-Build Failed!\n\n" + err.message);
                } finally {
                    document.getElementById('loadingOverlay').style.display = 'none'; e.target.value = '';
                }
            };
            reader.readAsDataURL(file);
        });

        // --- ACTION 2: REVIEW MODE LISTENER (QUEUE) ---
        document.getElementById('autoGradeFile').addEventListener('change', function(e) {
            if(e.target.files.length === 0) return;
            reviewQueue = Array.from(e.target.files);
            e.target.value = ''; 
            processNextReview();
        });

        // --- ACTION 3: SILENT BATCH MODE LISTENER ---
        document.getElementById('batchGradeFile').addEventListener('change', async function(e) {
            const files = Array.from(e.target.files);
            if(files.length === 0) return;
            e.target.value = ''; 
            
            if (!reportDirectoryHandle) {
                alert("Please select a master folder to save your Batch reports into first.");
                await selectSaveDirectory();
                if (!reportDirectoryHandle) return; 
            }

            document.getElementById('loadingOverlay').style.display = 'flex';
            
            let msgIdx = 0;
            document.getElementById('loadingSubtext').innerText = funnyMessages[msgIdx];
            funnyInterval = setInterval(() => {
                msgIdx = (msgIdx + 1) % funnyMessages.length;
                document.getElementById('loadingSubtext').innerText = funnyMessages[msgIdx];
            }, 3500);
            
            for (let i = 0; i < files.length; i++) {
                document.getElementById('loadingText').innerText = `Batch Grading: ${i + 1} of ${files.length}\n(${files[i].name})`;
                await processSingleBatchFile(files[i]);
            }

            clearInterval(funnyInterval);
            document.getElementById('loadingOverlay').style.display = 'none';
            document.getElementById('loadingSubtext').innerText = "This usually takes 5-15 seconds.";
            document.getElementById('loadingText').innerText = "AI is processing...";
            alert(`Batch Complete! ${files.length} reports saved to your folder.`);
        });
    }

    // --- GRADING PIPELINE LOGIC ---

    async function processNextReview() {
        if (reviewQueue.length === 0) {
            updateExportButtonUI();
            return;
        }

        const file = reviewQueue.shift();
        updateExportButtonUI();

        document.getElementById('loadingText').innerText = `AI is grading: ${file.name}`;
        document.getElementById('loadingOverlay').style.display = 'flex';

        const reader = new FileReader();
        reader.onload = async function(event) {
            const dataUrl = event.target.result;
            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: "grade",
                        fileBase64: dataUrl.split(',')[1],
                        mimeType: file.type,
                        rubric: currentRubric,
                        customPrompt: currentRubric.aiPrompt || ""
                    })
                });

                const rawResponse = await response.text();
                let cleanJson = rawResponse.replace(/```json/g, '').replace(/```/g, '').trim();
                const result = JSON.parse(cleanJson);

                if (result && result.error) throw new Error("Google Script says: " + result.error);
                
                if (result && result.grades) {
                    clearGrades(); 
                    
                    let bestName = result.studentName || "";
                    if (bestName.trim() === "" || bestName === "Unknown Student") {
                        bestName = file.name.replace(/\.[^/.]+$/, ""); 
                    }
                    document.getElementById('studentName').value = bestName;

                    result.grades.forEach(g => {
                        let matchedLevelIdx = currentRubric.criteria[g.criterionIndex].levels.findIndex(l => l.points === g.points);
                        if(matchedLevelIdx !== -1) {
                            selectScore(g.criterionIndex, matchedLevelIdx, g.points);
                        } else {
                            manualScoreUpdate(g.criterionIndex, g.points);
                        }
                        updateRowComment(g.criterionIndex, { value: g.comment });
                    });
                    
                    renderRubric(); 
                } else throw new Error("AI missed the grading format.");

            } catch (err) {
                console.error(err); 
                alert(`Grading failed for ${file.name}!\n\n` + err.message);
            } finally {
                document.getElementById('loadingOverlay').style.display = 'none';
            }
        };
        reader.readAsDataURL(file);
    }

    async function cleanupOldReports(dirHandle, safeStudent, safeProject, currentFilename) {
        if (!dirHandle) return;
        try {
            const prefix = `${safeStudent} - ${safeProject}`;
            for await (const [name, handle] of dirHandle.entries()) {
                if (name.startsWith(prefix) && name.endsWith('.html') && name !== currentFilename) {
                    await dirHandle.removeEntry(name);
                }
            }
        } catch(e) { console.warn("Cleanup error", e); }
    }

    async function processSingleBatchFile(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = async function(event) {
                const dataUrl = event.target.result;
                try {
                    const response = await fetch(WEB_APP_URL, {
                        method: 'POST',
                        body: JSON.stringify({
                            action: "grade",
                            fileBase64: dataUrl.split(',')[1],
                            mimeType: file.type,
                            rubric: currentRubric,
                            customPrompt: currentRubric.aiPrompt || ""
                        })
                    });

                    const rawResponse = await response.text();
                    let cleanJson = rawResponse.replace(/```json/g, '').replace(/```/g, '').trim();
                    const result = JSON.parse(cleanJson);

                    if (result && result.grades && !result.error) {
                        
                        let batchScores = {};
                        let batchComments = {};
                        let batchGraded = {};
                        currentRubric.criteria.forEach((_, idx) => {
                            batchScores[idx] = 0; batchComments[idx] = ''; batchGraded[idx] = false;
                        });

                        let bestName = result.studentName || "";
                        if (bestName.trim() === "" || bestName === "Unknown Student") {
                            bestName = file.name.replace(/\.[^/.]+$/, ""); 
                        }

                        result.grades.forEach(g => {
                            batchScores[g.criterionIndex] = g.points;
                            batchGraded[g.criterionIndex] = true;
                            batchComments[g.criterionIndex] = g.comment;
                        });

                        let totalScore = 0;
                        for (let key in batchScores) { totalScore += batchScores[key]; }

                        let safeStudent = bestName.replace(/[^a-z0-9\s]/gi, '_').trim();
                        let safeProject = (currentRubric.title || "Project").replace(/[^a-z0-9\s]/gi, '_').trim();
                        let jsonFilename = `${safeStudent} - ${safeProject}.json`;
                        let reportFilename = `${safeStudent} - ${safeProject} - ${totalScore}.html`;

                        const exportData = {
                            type: "StudentGradeRecord", studentName: bestName, projectTitle: currentRubric.title,
                            rubric: currentRubric, scores: batchScores, comments: batchComments, overallComment: "", isGraded: batchGraded
                        };
                        const jsonBlob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
                        
                        let tempScores = scores; let tempComments = comments; let tempGraded = isGraded;
                        scores = batchScores; comments = batchComments; isGraded = batchGraded;
                        const htmlReportString = generateStandaloneReport(bestName, currentRubric.title, totalScore);
                        scores = tempScores; comments = tempComments; isGraded = tempGraded;
                        
                        const reportBlob = new Blob([htmlReportString], { type: 'text/html' });

                        if (reportDirectoryHandle && jsonDirectoryHandle) {
                            await cleanupOldReports(reportDirectoryHandle, safeStudent, safeProject, reportFilename);
                            await silentWriteFile(jsonDirectoryHandle, jsonFilename, jsonBlob);
                            await silentWriteFile(reportDirectoryHandle, reportFilename, reportBlob);
                        }
                    }
                } catch (err) {
                    console.error(`Batch failed for ${file.name}`, err);
                }
                resolve(); 
            };
            reader.readAsDataURL(file);
        });
    }

    function autoFillMaxPoints() {
        if (isEditMode) return;
        let lastGradedIndex = -1;
        for (let i = currentRubric.criteria.length - 1; i >= 0; i--) {
            if (isGraded[i]) { lastGradedIndex = i; break; }
        }

        let limit = lastGradedIndex !== -1 ? lastGradedIndex : currentRubric.criteria.length;

        if (lastGradedIndex === -1) {
            if (!confirm("You haven't selected any grades yet. Do you want to automatically fill MAX POINTS for the ENTIRE rubric?")) return;
        }

        for (let i = 0; i < limit; i++) {
            if (!isGraded[i]) {
                let maxPts = -Infinity;
                let maxIdx = -1;
                currentRubric.criteria[i].levels.forEach((l, lIdx) => {
                    if (l.points > maxPts) { maxPts = l.points; maxIdx = lIdx; }
                });
                if (maxIdx !== -1) selectScore(i, maxIdx, maxPts);
            }
        }
    }

    function updateMaxScore() {
        let max = currentRubric.criteria.reduce((total, crit) => {
            if (!crit.levels || crit.levels.length === 0) return total;
            return total + Math.max(...crit.levels.map(l => l.points));
        }, 0);
        document.getElementById('maxScore').innerText = max;
    }

                    </div>

    function moveCriterion(index, direction) {
        if (direction === -1 && index === 0) return;
        if (direction === 1 && index === currentRubric.criteria.length - 1) return;

        const newIndex = index + direction;
        const tempCrit = currentRubric.criteria[index];
        currentRubric.criteria[index] = currentRubric.criteria[newIndex];
        currentRubric.criteria[newIndex] = tempCrit;

        const tempScore = scores[index]; scores[index] = scores[newIndex]; scores[newIndex] = tempScore;
        const tempComment = comments[index]; comments[index] = comments[newIndex]; comments[newIndex] = tempComment;
        const tempGraded = isGraded[index]; isGraded[index] = isGraded[newIndex]; isGraded[newIndex] = tempGraded;

        renderRubric();
    }

    function insertLevel(critIndex, insertIndex) { currentRubric.criteria[critIndex].levels.splice(insertIndex, 0, { points: 0, title: "New Level", desc: "" }); renderRubric(); }
    function removeLevel(critIndex, levelIndex) { currentRubric.criteria[critIndex].levels.splice(levelIndex, 1); renderRubric(); }
    function addCriterion() { currentRubric.criteria.push({ name: "New Criteria", levels: [ { points: 5, title: "Excellent", desc: "" } ] }); renderRubric(); }

    function removeCriterion(critIndex) {
        if(confirm("Are you sure you want to delete this entire row?")) {
            currentRubric.criteria.splice(critIndex, 1);
            delete scores[critIndex]; delete comments[critIndex]; delete isGraded[critIndex];
            
            let newScores = {}; let newComments = {}; let newGraded = {};
            currentRubric.criteria.forEach((_, i) => {
                newScores[i] = scores[i >= critIndex ? i + 1 : i] || 0;
                newComments[i] = comments[i >= critIndex ? i + 1 : i] || '';
                newGraded[i] = isGraded[i >= critIndex ? i + 1 : i] || false;
            });
            scores = newScores; comments = newComments; isGraded = newGraded;
            renderRubric();
        }
    }

    function selectScore(critIndex, levelIndex, points) {
        if(isEditMode) return;
        isGraded[critIndex] = true;
        currentRubric.criteria[critIndex].levels.forEach((_, i) => {
            const cell = document.getElementById(`cell-${critIndex}-${i}`);
            if(cell) cell.classList.remove('selected');
        });
        const activeCell = document.getElementById(`cell-${critIndex}-${levelIndex}`);
        if(activeCell) activeCell.classList.add('selected');
        
        document.getElementById(`score-input-${critIndex}`).value = points;
        scores[critIndex] = parseFloat(points);
        updateTotalDisplay();
    }

    function manualScoreUpdate(critIndex, value) {
        let val = parseFloat(value);
        if (isNaN(val)) val = 0;
        scores[critIndex] = val;
        isGraded[critIndex] = true;

        currentRubric.criteria[critIndex].levels.forEach((_, i) => {
            const cell = document.getElementById(`cell-${critIndex}-${i}`);
            if(cell) cell.classList.remove('selected');
        });
        updateTotalDisplay();
    }

    async function selectSaveDirectory() {
        try {
            reportDirectoryHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
            jsonDirectoryHandle = await reportDirectoryHandle.getDirectoryHandle('backups', { create: true });
            
            const statusEl = document.getElementById('saveStatus');
            statusEl.innerText = `Saving Reports to: ${reportDirectoryHandle.name} | JSONs to: backups/`;

            }
        }
    }

    async function silentWriteFile(handle, filename, blobData) {
        if (!handle) return false;
        try {
            try { await handle.removeEntry(filename); } catch(e) {} 
            const fileHandle = await handle.getFileHandle(filename, { create: true });
            const writable = await fileHandle.createWritable();
            await writable.write(blobData);
            await writable.close();
            return true;
        } catch (error) {
            console.error(`Failed to write ${filename}`, error);
            return false;
        }
    }

    function fallbackDownload(filename, blob) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    async function exportStudentDataAndReport() {
        let studentName = document.getElementById('studentName').value.trim();
        let missingGrades = [];
        
        currentRubric.criteria.forEach((crit, idx) => {
            if (!isGraded[idx]) { missingGrades.push(crit.name); }
        });

        if (!studentName || missingGrades.length > 0) {
            let warningMsg = "Hold on! You have missing information:\n\n";
            if (!studentName) warningMsg += "• Student/Group Name is blank\n";
            if (missingGrades.length > 0) {
                warningMsg += "• Unscored Categories:\n   - " + missingGrades.join("\n   - ") + "\n";
            }
            warningMsg += "\nDo you want to export the incomplete grade anyway?";
            
            if (!confirm(warningMsg)) { return; }
        }

        if (!reportDirectoryHandle && window.showDirectoryPicker) {
            alert("Please select a master folder to save your files into first.");
            await selectSaveDirectory();
            if (!reportDirectoryHandle) return; 
        }

        if(isEditMode) toggleEditMode();

        let safeStudent = studentName ? studentName.replace(/[^a-z0-9\s]/gi, '_').trim() : "Unnamed";
        let projectTitle = currentRubric.title || "Untitled Project";
        let safeProject = projectTitle.replace(/[^a-z0-9\s]/gi, '_').trim();
        let totalScore = document.getElementById('totalScore').innerText;

        let jsonFilename = `${safeStudent} - ${safeProject}.json`;
        let reportFilename = `${safeStudent} - ${safeProject} - ${totalScore}.html`;

        const exportData = {
            type: "StudentGradeRecord",
            studentName: studentName,
            projectTitle: projectTitle,
            rubric: currentRubric,
            scores: scores,
            comments: comments,
            overallComment: overallComment,
            isGraded: isGraded
        };
        const jsonBlob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
        const htmlReportString = generateStandaloneReport(studentName, projectTitle, totalScore);
        const reportBlob = new Blob([htmlReportString], { type: 'text/html' });

        try {
            if (reportDirectoryHandle && jsonDirectoryHandle) {
                await cleanupOldReports(reportDirectoryHandle, safeStudent, safeProject, reportFilename);
                const jsonSuccess = await silentWriteFile(jsonDirectoryHandle, jsonFilename, jsonBlob);
                const reportSuccess = await silentWriteFile(reportDirectoryHandle, reportFilename, reportBlob);
                
                if (!jsonSuccess || !reportSuccess) {
                    alert("There was an issue saving directly to the folder. Downloading via browser instead.");
                    fallbackDownload(jsonFilename, jsonBlob);
                    fallbackDownload(reportFilename, reportBlob);
                }
            } else {
                fallbackDownload(jsonFilename, jsonBlob);
                fallbackDownload(reportFilename, reportBlob);
            }
            
            if (reviewQueue.length > 0) {
                processNextReview();
            } else {
                clearGrades();
                updateExportButtonUI();
            }
            
        } catch (error) {
            console.error("Export Error", error);
            alert("An error occurred while generating the files.");
        }
    }

    async function exportRubricTemplate() {
        const dataStr = JSON.stringify(currentRubric, null, 2);
        const filename = (currentRubric.title || "Rubric").replace(/[^a-z0-9\s]/gi, '_').trim() + "_Template.json";
        const blob = new Blob([dataStr], { type: 'application/json' });
        fallbackDownload(filename, blob);
    }

    function escapeHTML(str) {
        if(!str) return '';
        return str.toString().replace(/[&<>'"]/g, 
            tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
        );
    }

    window.onload = init;
</script>

</body>
